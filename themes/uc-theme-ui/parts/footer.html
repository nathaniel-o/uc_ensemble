<style>
/* Footer Styles - Moved from style.css */
footer {
    background-color: black;
    border: 4px ridge rgb(1, 1, 1, 1);
    white-space: nowrap;
    height: fit-content;
    max-width: 68%;
}

@media (orientation: landscape) {
    footer {
        margin: 40px auto 0;
    }

    /* margin-bottom on footer collapses; pad the page wrapper instead */
    :where(.wp-site-blocks) {
        padding-bottom: 40px;
    }
}

.footer { /* this class helps footer logo for some reason  */ 
    display: flex;    flex-direction: row; 
    justify-content: right;
    align-items: center;
    background-color: #000000;
    white-space: nowrap;
    height: fit-content;
    width: 100%;
}
.wp-block-group footer > p {
    margin: 0;
    line-height: 1.2em;
    font-size: var(--wp--preset--font-size--small);
   
}

.footer-logo{

    width:auto;    height:auto;
    margin:0.2em;
}

.footer-logo > a > img {

    height:100%;width:auto;max-height:64px;
}
.is-layout-flow > .footer-logo.alignright{
    margin-inline-start: 0;
}



/* Mobile styles */
@media (max-width: 768px) {
    
    :where(.wp-site-blocks) > :last-child {
        /* override default  */
        margin-block-end: 40px;
    }
    footer {
        margin: 40px auto 40px auto;
        padding: auto;
        max-width: 95%;
    }
    
    .footer-logo > a > img {
        display: inline;
        max-height: 48px;
        
    }
    
    footer p {
        margin: auto 0 auto auto;
        text-align: right;
        font-size: var(--wp--preset--font-size--small);
        line-height: 1.8em;
    }
}
</style>
